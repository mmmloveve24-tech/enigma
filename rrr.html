<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Sea Pixel Wallpaper</title>
<style>
  body { margin: 0; background: #06101e; display: flex; justify-content: center; align-items: flex-start; padding: 2rem 0; min-height: 100vh; }
  #wrap { display: flex; justify-content: center; align-items: flex-start; }
  #c { image-rendering: pixelated; image-rendering: crisp-edges; height: min(82vh, 580px); width: auto; display: block; border-radius: 14px; box-shadow: 0 0 60px #0a1830; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
(function(){
const AW=120, AH=213, SC=3;
const cvs = document.getElementById('c');
cvs.width = AW*SC;
cvs.height = AH*SC;
const ctx = cvs.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Helpers
const p   = (x, y, w, h) => ctx.fillRect(x*SC, y*SC, (w||1)*SC, (h||1)*SC);
const clr = (r, g, b, a) => { ctx.fillStyle = a !== undefined ? `rgba(${r},${g},${b},${a})` : `rgb(${r},${g},${b})`; };

// ── Entities ──────────────────────────────────────────────────────────────────

const jellies = [
  { x:22,  y:165, vy:-0.024, phase:0.0, r:0,  g:190, b:255 },
  { x:80,  y:100, vy:-0.019, phase:2.0, r:0,  g:140, b:230 },
  { x:97,  y:178, vy:-0.021, phase:4.2, r:30, g:170, b:255 },
  { x:12,  y:75,  vy:-0.016, phase:1.2, r:0,  g:210, b:245 },
];

const school = { x:55, y:82, vx:0.11, dir:1 };
const fishOff = [
  { dx:0,   dy:0  }, { dx:9,   dy:-2 }, { dx:-8,  dy:3  }, { dx:15,  dy:1  },
  { dx:-13, dy:-3 }, { dx:7,   dy:5  }, { dx:21,  dy:-1 }, { dx:-5,  dy:-5 },
  { dx:18,  dy:4  }, { dx:-10, dy:4  },
];

const squids = [
  { x:-38,  y:126, vx:0.09, dir:1  },
  { x:148,  y:153, vx:0.06, dir:-1 },
];

const plankton = Array.from({ length:48 }, () => ({
  x:  Math.random() * AW,
  y:  6 + Math.random() * (AH * 0.88),
  ph: Math.random() * 6.28,
  sz: Math.random() < 0.22 ? 2 : 1,
}));

const rockDefs = [
  { x:0,  base:AH,  seg:[0,13, 8,9,  14,12, 22,6,  30,10, 37,8,  44,13, 52,14] },
  { x:42, base:AH,  seg:[0,10, 7,6,  14,10, 22,4,  30,8,  38,10]               },
  { x:80, base:AH,  seg:[0,11, 9,7,  16,10, 25,3,  33,8,  42,11]               },
  { x:8,  base:207, seg:[0,5,  5,2,  11,4,  17,1,  23,3,  29,5]                },
  { x:62, base:207, seg:[0,4,  5,1,  10,3,  15,1,  20,3,  25,4]                },
];

// ── Draw functions ────────────────────────────────────────────────────────────

function drawBG() {
  const g = ctx.createLinearGradient(0, 0, 0, cvs.height);
  g.addColorStop(0,   '#0d2145');
  g.addColorStop(0.3, '#091830');
  g.addColorStop(0.6, '#060f1e');
  g.addColorStop(1,   '#030810');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  // Subtle scanlines for 16-bit depth
  clr(20, 60, 120, 0.022);
  for (let r = 0; r < AH; r += 4) ctx.fillRect(0, r*SC, cvs.width, SC);
}

function drawCaustics(t) {
  for (let i = 0; i < 6; i++) {
    const cx = ((i*23 + Math.sin(t*0.22 + i*1.1)*9 + AW) % AW) * SC;
    const cy = (8 + i*19 + Math.sin(t*0.31 + i*0.8)*5) * SC;
    const gr = ctx.createRadialGradient(cx, cy, SC, cx, cy, 24*SC);
    gr.addColorStop(0, 'rgba(14,65,145,.07)');
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.fillRect(0, 0, cvs.width, cvs.height);
  }
}

function drawPlankton(t) {
  for (const pk of plankton) {
    clr(80, 195, 255, 0.2 + Math.sin(t*1.85 + pk.ph) * 0.18);
    p(Math.round(pk.x), Math.round(pk.y), pk.sz, pk.sz);
  }
}

function drawFloor(t) {
  // Base floor fill
  clr(4, 10, 18, 1);
  p(0, 200, AW, AH - 200);

  // Rock formations
  for (const rd of rockDefs) {
    const seg = rd.seg;
    clr(9, 21, 34, 1);
    for (let i = 0; i < seg.length - 2; i += 2) {
      const x0=seg[i], h0=seg[i+1], x1=seg[i+2], h1=seg[i+3];
      for (let rx = x0; rx < x1; rx++) {
        const frac = (rx - x0) / (x1 - x0);
        const rh   = Math.max(1, Math.round(h0 + (h1 - h0) * frac));
        p(rd.x + rx, rd.base - rh, 1, rh);
      }
    }
    // Highlight edge
    clr(15, 34, 55, 0.5);
    for (let i = 0; i < seg.length - 2; i += 2) {
      const x0=seg[i], h0=seg[i+1], x1=seg[i+2], h1=seg[i+3];
      p(rd.x + Math.round((x0+x1)/2), rd.base - Math.round((h0+h1)/2), 1, 1);
    }
  }

  // Sediment glow
  for (let i = 0; i < 24; i++) {
    clr(55, 150, 195, 0.1 + Math.sin(t*1.1 + i*0.65) * 0.07);
    p((i*5 + 2) % AW, 200 + (i % 4), 1, 1);
  }
}

// Jellyfish bell shape: [offsetX, offsetY, width]
const BELL = [
  [2,0,4], [1,1,6], [0,2,8], [0,3,8],
  [0,4,8], [1,5,6], [2,6,4],
];

function drawJelly(jx, jy, phase, r, g, b, t) {
  const pulse = Math.sin(t*1.6 + phase);
  const gx = Math.round(jx) - 4;
  const gy = Math.round(jy);

  // Glow aura
  clr(r, g, b, 0.09 + pulse * 0.04);
  for (const [ox,oy,w] of BELL) p(gx+ox-1, gy+oy-1, w+2, 3);

  // Bell body
  clr(r, g, b, 0.52 + pulse * 0.1);
  for (const [ox,oy,w] of BELL) p(gx+ox, gy+oy, w, 1);

  // Specular highlight
  clr(255, 255, 255, 0.18 + pulse * 0.06);
  p(gx+2, gy+1, 3, 2);
  p(gx+3, gy,   2, 1);

  // Tentacle roots
  clr(r, g, b, 0.9);
  p(gx+1, gy+5, 1, 1);
  p(gx+3, gy+5, 1, 1);
  p(gx+5, gy+5, 1, 1);

  // Tentacles (4 strands)
  const tX  = [gx+1, gx+3, gx+5, gx+7];
  const tLen = 9 + Math.round(pulse * 2);
  for (let i = 0; i < 4; i++) {
    for (let s = 0; s < tLen; s++) {
      const ty   = gy + 7 + s;
      if (ty >= 200) break;
      const wave = Math.round(Math.sin(t*2.3 + phase + i + s*0.35) * 1.5);
      const a    = Math.max(0, (0.5 - s/tLen*0.42) * (0.65 + pulse*0.15));
      clr(r, g, b, a);
      p(Math.max(0, Math.min(AW-1, tX[i] + wave)), ty, 1, 1);
    }
  }
}

function drawFish(fx, fy, dir, r, g, b, a) {
  fx = Math.round(fx);
  fy = Math.round(fy);
  if (fx < -6 || fx > AW + 6) return;
  // Body
  clr(r, g, b, a);
  p(fx+1, fy,   3, 1);
  p(fx,   fy+1, 5, 1);
  p(fx+1, fy+2, 3, 1);
  // Eye
  clr(Math.min(r+80,255), Math.min(g+80,255), 255, a);
  p(dir >= 0 ? fx+4 : fx, fy+1, 1, 1);
  // Tail
  clr(r, g, b, a * 0.6);
  const tx = dir >= 0 ? fx : fx + 4;
  p(tx, fy,   1, 1);
  p(tx, fy+2, 1, 1);
}

function drawSchool(t) {
  for (let i = 0; i < fishOff.length; i++) {
    const fo  = fishOff[i];
    const wv  = Math.sin(t*1.9 + i*0.65) * 1.3;
    const a   = 0.38 + Math.sin(t*0.5 + i*0.4) * 0.1;
    drawFish(school.x + fo.dx, school.y + fo.dy + wv, school.dir, 190, 215, 240, a);
  }
}

// Squid mantle shape: [offsetX, offsetY, width]
const MANTLE = [
  [4,0,6], [2,1,10], [1,2,12], [0,3,14],
  [1,4,12], [2,5,10], [4,6,6], [5,7,4], [6,8,2],
];

function drawSquid(sq, t) {
  const gx = Math.round(sq.x);
  const gy = Math.round(sq.y + Math.sin(t*1.1 + sq.x*0.06) * 1.2);

  // Mantle glow
  clr(175, 55, 75, 0.11);
  for (const [ox,oy,w] of MANTLE) p(gx+ox-1, gy+oy-1, w+2, 3);

  // Mantle body
  clr(150, 46, 63, 0.82);
  for (const [ox,oy,w] of MANTLE) p(gx+ox, gy+oy, w, 1);

  // Internal pattern highlight
  clr(200, 98, 118, 0.28);
  p(gx+3, gy+1, 8, 1);
  p(gx+2, gy+2, 9, 1);

  // Fins
  clr(122, 37, 53, 0.72);
  if (sq.dir > 0) { p(gx-1, gy+2, 2, 3); p(gx-2, gy+3, 1, 2); }
  else            { p(gx+13, gy+2, 2, 3); p(gx+15, gy+3, 1, 2); }

  // Eye
  const ex = sq.dir > 0 ? gx+10 : gx+2;
  clr(255, 162, 172, 0.92);
  p(ex, gy+3, 2, 2);
  clr(12, 4, 7, 1);
  p(ex, gy+3, 1, 1);

  // Tentacles (8 strands, waving)
  const hx = sq.dir > 0 ? gx+14 : gx-1;
  for (let i = 0; i < 8; i++) {
    const ty = gy + 1 + Math.floor(i * 0.85);
    const tl = 3 + (i % 4);
    const tw = Math.round(Math.sin(t*3.2 + i*0.85) * 1);
    clr(193, 70, 88, Math.max(0, 0.6 - i*0.045));
    for (let s = 0; s < tl; s++) {
      const tx = sq.dir > 0 ? hx + s : hx - s;
      if (tx >= 0 && tx < AW) p(tx, ty + tw, 1, 1);
    }
  }
}

function drawVignette() {
  const cx = cvs.width / 2, cy = cvs.height / 2;
  const gr = ctx.createRadialGradient(cx, cy, cvs.height*0.18, cx, cy, cvs.height*0.72);
  gr.addColorStop(0, 'rgba(0,0,0,0)');
  gr.addColorStop(1, 'rgba(0,2,8,.58)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 0, cvs.width, cvs.height);
}

function drawTimerGlow() {
  const cx = 60 * SC, cy = 98 * SC;
  const gr = ctx.createRadialGradient(cx, cy, 4, cx, cy, 52*SC);
  gr.addColorStop(0,   'rgba(0,110,255,.042)');
  gr.addColorStop(0.6, 'rgba(0,60,180,.015)');
  gr.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 0, cvs.width, cvs.height);
}

// ── Game loop ─────────────────────────────────────────────────────────────────

function update(t) {
  for (const j of jellies) {
    j.y += j.vy;
    if (j.y < -26) { j.y = AH + 8; j.x = 8 + Math.random() * (AW - 16); }
  }
  for (const s of squids) {
    s.x += s.vx * s.dir;
    if (s.dir >  0 && s.x >  AW + 42) s.x = -42;
    if (s.dir < 0  && s.x < -42)      s.x =  AW + 42;
  }
  school.x += school.vx * school.dir;
  if (school.dir >  0 && school.x >  AW + 28) school.dir = -1;
  if (school.dir < 0  && school.x < -28)       school.dir =  1;
  school.y = 82 + Math.sin(t * 0.28) * 12;
}

function draw(t) {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  drawBG();
  drawCaustics(t);
  drawPlankton(t);
  drawFloor(t);
  drawSchool(t);
  for (const s of squids) drawSquid(s, t);
  for (const j of jellies) drawJelly(j.x, j.y, j.phase, j.r, j.g, j.b, t);
  drawVignette();
  drawTimerGlow();
}

function loop(ts) {
  const t = ts / 1000;
  update(t);
  draw(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
